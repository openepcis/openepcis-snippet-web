<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
    <!-- EPCIS Profile Checker Favicon (Circle variant) -->
    <!-- Simplified: Circle with checkmark, optimized for small sizes -->
    <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0.5" y2="1">
            <stop offset="0%" stop-color="#4272c4"/>
            <stop offset="100%" stop-color="#2d4d9d"/>
        </linearGradient>
    </defs>

    <!-- Circle -->
    <circle cx="16" cy="16" r="14" fill="url(#cg)"/>

    <!-- Checkmark -->
    <polyline points="10,17 13.5,21 22,11"
              fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
